root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o tmp/clank-core.exe ./cmd/clank-core"
  bin = "tmp/clank-core.exe"
  args = ["--mode", "embedded", "--port", "7731"]
  delay = 500
  exclude_dir = ["tmp", "testdata", "vendor"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "toml"]
  kill_delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
