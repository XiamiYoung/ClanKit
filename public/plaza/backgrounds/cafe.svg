<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#F5DEB3"/>
  <!-- warm floor -->
  <rect y="300" width="900" height="100" fill="#D2B48C"/>
  <line x1="0" y1="300" x2="900" y2="300" stroke="#C4A67A" stroke-width="2"/>
  <!-- back wall wainscoting -->
  <rect y="200" width="900" height="100" fill="#E8D5B0" opacity="0.5"/>
  <line x1="0" y1="200" x2="900" y2="200" stroke="#C4A67A" stroke-width="1"/>
  <!-- table left -->
  <rect x="80" y="260" width="120" height="8" rx="2" fill="#8B6914"/>
  <rect x="100" y="268" width="6" height="50" fill="#8B6914"/>
  <rect x="180" y="268" width="6" height="50" fill="#8B6914"/>
  <!-- chair left -->
  <rect x="60" y="240" width="30" height="40" rx="4" fill="#6B4E16" opacity="0.7"/>
  <rect x="60" y="280" width="6" height="30" fill="#6B4E16" opacity="0.7"/>
  <rect x="84" y="280" width="6" height="30" fill="#6B4E16" opacity="0.7"/>
  <!-- table center -->
  <ellipse cx="450" cy="270" rx="70" ry="6" fill="#8B6914"/>
  <rect x="447" y="276" width="6" height="44" fill="#8B6914"/>
  <!-- chairs center -->
  <rect x="390" y="248" width="28" height="36" rx="4" fill="#6B4E16" opacity="0.7"/>
  <rect x="490" y="248" width="28" height="36" rx="4" fill="#6B4E16" opacity="0.7"/>
  <!-- table right -->
  <rect x="680" y="260" width="140" height="8" rx="2" fill="#8B6914"/>
  <rect x="710" y="268" width="6" height="50" fill="#8B6914"/>
  <rect x="800" y="268" width="6" height="50" fill="#8B6914"/>
  <!-- chair right -->
  <rect x="820" y="240" width="30" height="40" rx="4" fill="#6B4E16" opacity="0.7"/>
  <!-- hanging lamp left -->
  <line x1="140" y1="0" x2="140" y2="80" stroke="#A08040" stroke-width="2"/>
  <path d="M120 80 Q140 100 160 80" fill="#FFD700" opacity="0.6"/>
  <ellipse cx="140" cy="80" rx="20" ry="8" fill="#FFD700" opacity="0.3"/>
  <!-- hanging lamp right -->
  <line x1="750" y1="0" x2="750" y2="80" stroke="#A08040" stroke-width="2"/>
  <path d="M730 80 Q750 100 770 80" fill="#FFD700" opacity="0.6"/>
  <ellipse cx="750" cy="80" rx="20" ry="8" fill="#FFD700" opacity="0.3"/>
  <!-- counter back wall -->
  <rect x="350" y="140" width="200" height="60" rx="4" fill="#A0784C" opacity="0.4"/>
  <rect x="360" y="150" width="40" height="40" rx="2" fill="#C4A67A" opacity="0.5"/>
  <rect x="410" y="150" width="40" height="40" rx="2" fill="#C4A67A" opacity="0.5"/>
  <rect x="460" y="150" width="40" height="40" rx="2" fill="#C4A67A" opacity="0.5"/>
  <!-- warm ambient glow -->
  <ellipse cx="450" cy="200" rx="300" ry="150" fill="#FFD700" opacity="0.04"/>
</svg>
