<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#E8EDF2"/>
  <!-- floor -->
  <rect y="320" width="900" height="80" fill="#D0D5DC"/>
  <line x1="0" y1="320" x2="900" y2="320" stroke="#C0C5CC" stroke-width="1"/>
  <!-- back wall panel -->
  <rect x="0" y="0" width="900" height="320" fill="#E8EDF2"/>
  <!-- window left -->
  <rect x="60" y="40" width="160" height="140" rx="4" fill="#B8D4E8" stroke="#A0B0C0" stroke-width="2"/>
  <line x1="140" y1="40" x2="140" y2="180" stroke="#A0B0C0" stroke-width="1.5"/>
  <line x1="60" y1="110" x2="220" y2="110" stroke="#A0B0C0" stroke-width="1.5"/>
  <!-- window right -->
  <rect x="680" y="40" width="160" height="140" rx="4" fill="#B8D4E8" stroke="#A0B0C0" stroke-width="2"/>
  <line x1="760" y1="40" x2="760" y2="180" stroke="#A0B0C0" stroke-width="1.5"/>
  <line x1="680" y1="110" x2="840" y2="110" stroke="#A0B0C0" stroke-width="1.5"/>
  <!-- main desk -->
  <rect x="280" y="240" width="340" height="12" rx="3" fill="#8B9DAF"/>
  <rect x="290" y="252" width="10" height="68" fill="#7A8C9E"/>
  <rect x="600" y="252" width="10" height="68" fill="#7A8C9E"/>
  <!-- monitor on desk -->
  <rect x="400" y="170" width="100" height="65" rx="4" fill="#2C3E50" stroke="#4A5568" stroke-width="2"/>
  <rect x="405" y="175" width="90" height="50" rx="2" fill="#34495E"/>
  <rect x="440" y="235" width="20" height="8" fill="#4A5568"/>
  <rect x="430" y="240" width="40" height="4" rx="2" fill="#4A5568"/>
  <!-- keyboard -->
  <rect x="415" y="248" width="70" height="10" rx="2" fill="#BDC3C7" opacity="0.6"/>
  <!-- side desk left -->
  <rect x="60" y="260" width="140" height="10" rx="2" fill="#8B9DAF" opacity="0.7"/>
  <rect x="65" y="270" width="8" height="50" fill="#7A8C9E" opacity="0.7"/>
  <rect x="187" y="270" width="8" height="50" fill="#7A8C9E" opacity="0.7"/>
  <!-- office chair silhouette -->
  <ellipse cx="450" cy="300" rx="30" ry="8" fill="#4A5568" opacity="0.3"/>
  <rect x="440" y="280" width="20" height="20" rx="4" fill="#4A5568" opacity="0.3"/>
  <!-- whiteboard -->
  <rect x="340" y="50" width="220" height="100" rx="4" fill="#FFFFFF" stroke="#C0C5CC" stroke-width="2"/>
  <line x1="360" y1="80" x2="520" y2="80" stroke="#A0B0C0" stroke-width="1" opacity="0.4"/>
  <line x1="360" y1="100" x2="480" y2="100" stroke="#A0B0C0" stroke-width="1" opacity="0.4"/>
  <line x1="360" y1="120" x2="500" y2="120" stroke="#A0B0C0" stroke-width="1" opacity="0.4"/>
  <!-- plant -->
  <rect x="780" y="260" width="24" height="28" rx="4" fill="#8B9DAF" opacity="0.5"/>
  <ellipse cx="792" cy="250" rx="16" ry="20" fill="#6B8E6B" opacity="0.5"/>
  <ellipse cx="784" cy="245" rx="10" ry="14" fill="#7BA07B" opacity="0.4"/>
  <!-- ceiling light -->
  <rect x="380" y="0" width="140" height="6" rx="2" fill="#C0C5CC"/>
  <rect x="430" y="6" width="40" height="10" rx="2" fill="#D0D5DC"/>
</svg>
