  <rect x="555" y="260" width="4" height="28" fill="#6D4C2C"/>
  <rect x="621" y="260" width="4" height="28" fill="#6D4C2C"/>
  <rect x="555" y="260" width="70" height="6" rx="1" fill="#8B6340"/>
