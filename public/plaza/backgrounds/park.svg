  <path d="M350 400 Q400 320 450 280 Q500 250 550 240 Q620 230 700 240 Q780 250 900 240" fill="none" stroke="#C4A97D" stroke-width="40" stroke-linecap="round" opacity="0.6"/>
  <path d="M350 400 Q400 320 450 280 Q500 250 550 240 Q620 230 700 240 Q780 250 900 240" fill="none" stroke="#D4B98D" stroke-width="30" stroke-linecap="round" opacity="0.3"/>
