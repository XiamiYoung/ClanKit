<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 128">
  <!-- Explorer - green silhouette with backpack -->
  <!-- Shadow -->
  <ellipse cx="32" cy="124" rx="16" ry="4" fill="#000000" opacity="0.15"/>
  <!-- Legs -->
  <rect x="21" y="88" width="9" height="32" rx="4" fill="#4A6741"/>
  <rect x="34" y="88" width="9" height="32" rx="4" fill="#4A6741"/>
  <!-- Boots -->
  <rect x="18" y="116" width="14" height="8" rx="3" fill="#5C3510"/>
  <rect x="32" y="116" width="14" height="8" rx="3" fill="#5C3510"/>
  <!-- Boot laces -->
  <line x1="22" y1="118" x2="28" y2="118" stroke="#8B6914" stroke-width="0.8"/>
  <line x1="22" y1="121" x2="28" y2="121" stroke="#8B6914" stroke-width="0.8"/>
  <line x1="36" y1="118" x2="42" y2="118" stroke="#8B6914" stroke-width="0.8"/>
  <line x1="36" y1="121" x2="42" y2="121" stroke="#8B6914" stroke-width="0.8"/>
  <!-- Body / jacket -->
  <path d="M18 48 Q18 42 24 40 L40 40 Q46 42 46 48 L46 92 Q46 94 44 94 L20 94 Q18 94 18 92 Z" fill="#2D6A30"/>
  <!-- Jacket pockets -->
  <rect x="20" y="70" width="10" height="10" rx="2" fill="#256828" stroke="#1B4D1E" stroke-width="0.8"/>
  <rect x="34" y="70" width="10" height="10" rx="2" fill="#256828" stroke="#1B4D1E" stroke-width="0.8"/>
  <!-- Jacket zipper -->
  <line x1="32" y1="44" x2="32" y2="92" stroke="#1B4D1E" stroke-width="1.5"/>
  <!-- Belt -->
  <rect x="18" y="82" width="28" height="4" rx="1" fill="#6B4A14"/>
  <rect x="30" y="81" width="4" height="6" rx="1" fill="#8B6914"/>
  <!-- Backpack -->
  <rect x="42" y="42" width="16" height="36" rx="4" fill="#8B6914"/>
  <rect x="44" y="46" width="12" height="8" rx="2" fill="#6B4A14"/>
  <!-- Backpack straps -->
  <line x1="46" y1="42" x2="40" y2="48" stroke="#6B4A14" stroke-width="2.5"/>
  <line x1="54" y1="42" x2="46" y2="48" stroke="#6B4A14" stroke-width="2.5"/>
  <!-- Sleeping roll on top of backpack -->
  <ellipse cx="50" cy="40" rx="7" ry="3" fill="#4A7C59"/>
  <!-- Arms -->
  <rect x="8" y="48" width="10" height="28" rx="5" fill="#256828"/>
  <rect x="46" y="48" width="10" height="28" rx="5" fill="#256828"/>
  <!-- Hands -->
  <circle cx="13" cy="78" r="4" fill="#D4A574"/>
  <circle cx="51" cy="78" r="4" fill="#D4A574"/>
  <!-- Neck -->
  <rect x="28" y="34" width="8" height="7" fill="#D4A574"/>
  <!-- Scarf/bandana -->
  <path d="M24 38 Q32 42 40 38 Q40 40 32 44 Q24 40 24 38" fill="#DC2626"/>
  <!-- Head -->
  <ellipse cx="32" cy="26" rx="12" ry="13" fill="#D4A574"/>
  <!-- Eyes -->
  <circle cx="27" cy="24" r="1.5" fill="#1A1A1A"/>
  <circle cx="37" cy="24" r="1.5" fill="#1A1A1A"/>
  <!-- Smile -->
  <path d="M28 30 Q32 33 36 30" fill="none" stroke="#1A1A1A" stroke-width="1" stroke-linecap="round"/>
  <!-- Explorer hat -->
  <ellipse cx="32" cy="16" rx="18" ry="4" fill="#5C3510"/>
  <path d="M18 16 Q18 6 32 4 Q46 6 46 16" fill="#6B4A14"/>
  <!-- Hat band -->
  <rect x="18" y="14" width="28" height="3" fill="#4A7C59"/>
  <!-- Compass on belt -->
  <circle cx="24" cy="84" r="3" fill="#D4A574" stroke="#8B6914" stroke-width="1"/>
  <line x1="24" y1="82" x2="24" y2="86" stroke="#DC2626" stroke-width="0.8"/>
  <line x1="22" y1="84" x2="26" y2="84" stroke="#1A1A1A" stroke-width="0.8"/>
</svg>
