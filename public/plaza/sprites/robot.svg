<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 128">
  <!-- Robot - silver/gray silhouette with antenna -->
  <!-- Shadow -->
  <ellipse cx="32" cy="124" rx="16" ry="4" fill="#000000" opacity="0.15"/>
  <!-- Legs -->
  <rect x="20" y="90" width="10" height="28" rx="2" fill="#6B7280"/>
  <rect x="34" y="90" width="10" height="28" rx="2" fill="#6B7280"/>
  <!-- Knee joints -->
  <circle cx="25" cy="100" r="4" fill="#9CA3AF"/>
  <circle cx="39" cy="100" r="4" fill="#9CA3AF"/>
  <!-- Feet -->
  <rect x="17" y="116" width="16" height="8" rx="2" fill="#4B5563"/>
  <rect x="31" y="116" width="16" height="8" rx="2" fill="#4B5563"/>
  <!-- Body / torso -->
  <rect x="16" y="46" width="32" height="46" rx="6" fill="#9CA3AF"/>
  <!-- Chest panel -->
  <rect x="22" y="52" width="20" height="16" rx="3" fill="#6B7280"/>
  <!-- Chest lights -->
  <circle cx="28" cy="58" r="2.5" fill="#3B82F6"/>
  <circle cx="36" cy="58" r="2.5" fill="#3B82F6"/>
  <circle cx="32" cy="64" r="2" fill="#10B981"/>
  <!-- Vent lines -->
  <line x1="24" y1="74" x2="40" y2="74" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="24" y1="78" x2="40" y2="78" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="24" y1="82" x2="40" y2="82" stroke="#6B7280" stroke-width="1.5"/>
  <!-- Arms -->
  <rect x="6" y="48" width="10" height="26" rx="4" fill="#6B7280"/>
  <rect x="48" y="48" width="10" height="26" rx="4" fill="#6B7280"/>
  <!-- Elbow joints -->
  <circle cx="11" cy="74" r="4" fill="#9CA3AF"/>
  <circle cx="53" cy="74" r="4" fill="#9CA3AF"/>
  <!-- Forearms -->
  <rect x="7" y="74" width="8" height="14" rx="3" fill="#6B7280"/>
  <rect x="49" y="74" width="8" height="14" rx="3" fill="#6B7280"/>
  <!-- Hands / clamps -->
  <rect x="7" y="86" width="8" height="6" rx="2" fill="#4B5563"/>
  <rect x="49" y="86" width="8" height="6" rx="2" fill="#4B5563"/>
  <!-- Neck -->
  <rect x="28" y="38" width="8" height="10" rx="2" fill="#6B7280"/>
  <!-- Head -->
  <rect x="18" y="14" width="28" height="26" rx="6" fill="#D1D5DB"/>
  <!-- Face plate -->
  <rect x="22" y="18" width="20" height="18" rx="4" fill="#9CA3AF"/>
  <!-- Eyes -->
  <circle cx="28" cy="26" r="3.5" fill="#1F2937"/>
  <circle cx="36" cy="26" r="3.5" fill="#1F2937"/>
  <circle cx="28" cy="26" r="2" fill="#3B82F6"/>
  <circle cx="36" cy="26" r="2" fill="#3B82F6"/>
  <!-- Mouth -->
  <rect x="27" y="32" width="10" height="2" rx="1" fill="#4B5563"/>
  <!-- Antenna -->
  <rect x="30" y="4" width="4" height="12" rx="2" fill="#6B7280"/>
  <circle cx="32" cy="4" r="4" fill="#EF4444"/>
  <circle cx="32" cy="4" r="2" fill="#FCA5A5"/>
  <!-- Ear panels -->
  <rect x="14" y="22" width="4" height="10" rx="2" fill="#6B7280"/>
  <rect x="46" y="22" width="4" height="10" rx="2" fill="#6B7280"/>
</svg>
