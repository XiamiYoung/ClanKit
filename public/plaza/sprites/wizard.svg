<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 128">
  <!-- Wizard - purple silhouette with pointed hat -->
  <!-- Shadow -->
  <ellipse cx="32" cy="124" rx="16" ry="4" fill="#000000" opacity="0.15"/>
  <!-- Robe bottom / skirt -->
  <path d="M14 75 L12 120 Q12 124 16 124 L48 124 Q52 124 52 120 L50 75 Z" fill="#5B21B6"/>
  <!-- Robe trim -->
  <path d="M12 120 Q32 116 52 120 Q52 124 48 124 L16 124 Q12 124 12 120" fill="#4C1D95"/>
  <!-- Body / robe top -->
  <path d="M18 48 Q18 42 24 40 L40 40 Q46 42 46 48 L50 78 L14 78 Z" fill="#7C3AED"/>
  <!-- Robe sash -->
  <rect x="18" y="68" width="28" height="4" rx="1" fill="#A855F7"/>
  <ellipse cx="32" cy="70" rx="4" ry="3" fill="#C084FC"/>
  <!-- Arms in robe -->
  <path d="M18 52 L6 72 L10 76 L22 60 Z" fill="#6D28D9"/>
  <path d="M46 52 L58 72 L54 76 L42 60 Z" fill="#6D28D9"/>
  <!-- Hands -->
  <circle cx="8" cy="74" r="4" fill="#D4A574"/>
  <circle cx="56" cy="74" r="4" fill="#D4A574"/>
  <!-- Staff (right hand) -->
  <rect x="54" y="20" width="3" height="100" rx="1" fill="#8B6914"/>
  <!-- Staff crystal -->
  <polygon points="55.5,14 51,22 60,22" fill="#A855F7"/>
  <circle cx="55.5" cy="19" r="3" fill="#C084FC" opacity="0.8"/>
  <!-- Sparkle on staff -->
  <circle cx="55.5" cy="19" r="1" fill="#FFFFFF"/>
  <!-- Neck -->
  <rect x="28" y="34" width="8" height="7" fill="#D4A574"/>
  <!-- Beard -->
  <path d="M24 36 Q24 40 22 52 Q28 48 32 52 Q36 48 42 52 Q40 40 40 36" fill="#E5E7EB"/>
  <!-- Head -->
  <ellipse cx="32" cy="28" rx="11" ry="12" fill="#D4A574"/>
  <!-- Eyes -->
  <circle cx="27" cy="26" r="1.5" fill="#1A1A1A"/>
  <circle cx="37" cy="26" r="1.5" fill="#1A1A1A"/>
  <!-- Eyebrows - wise -->
  <line x1="24" y1="22" x2="30" y2="23" stroke="#8B7355" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="34" y1="23" x2="40" y2="22" stroke="#8B7355" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M31 28 Q32 30 33 28" fill="none" stroke="#C4956A" stroke-width="1"/>
  <!-- Wizard hat -->
  <path d="M14 20 L32 -6 L50 20 Z" fill="#5B21B6"/>
  <ellipse cx="32" cy="20" rx="20" ry="5" fill="#4C1D95"/>
  <!-- Hat band -->
  <ellipse cx="32" cy="20" rx="18" ry="4" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  <!-- Hat star -->
  <polygon points="32,4 33.5,8 38,8 34.5,11 36,15 32,12 28,15 29.5,11 26,8 30.5,8" fill="#FFD700" opacity="0.8"/>
  <!-- Sparkles around wizard -->
  <circle cx="12" cy="60" r="1" fill="#C084FC" opacity="0.6"/>
  <circle cx="52" cy="50" r="1" fill="#C084FC" opacity="0.6"/>
  <circle cx="20" cy="45" r="0.8" fill="#A855F7" opacity="0.5"/>
</svg>
