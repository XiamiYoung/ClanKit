<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 128">
  <!-- Scholar - blue silhouette with graduation cap -->
  <!-- Shadow -->
  <ellipse cx="32" cy="124" rx="16" ry="4" fill="#000000" opacity="0.15"/>
  <!-- Legs -->
  <rect x="21" y="90" width="9" height="32" rx="4" fill="#1A3A5C"/>
  <rect x="34" y="90" width="9" height="32" rx="4" fill="#1A3A5C"/>
  <!-- Shoes -->
  <rect x="19" y="118" width="13" height="6" rx="3" fill="#0F2A44"/>
  <rect x="32" y="118" width="13" height="6" rx="3" fill="#0F2A44"/>
  <!-- Body / robe -->
  <path d="M18 55 Q18 48 24 45 L40 45 Q46 48 46 55 L46 94 Q46 96 44 96 L20 96 Q18 96 18 94 Z" fill="#2563EB"/>
  <!-- Arms -->
  <rect x="10" y="52" width="10" height="30" rx="5" fill="#1D4ED8"/>
  <rect x="44" y="52" width="10" height="30" rx="5" fill="#1D4ED8"/>
  <!-- Hands -->
  <circle cx="15" cy="84" r="4" fill="#D4A574"/>
  <circle cx="49" cy="84" r="4" fill="#D4A574"/>
  <!-- Neck -->
  <rect x="28" y="38" width="8" height="8" fill="#D4A574"/>
  <!-- Head -->
  <ellipse cx="32" cy="30" rx="12" ry="14" fill="#D4A574"/>
  <!-- Eyes -->
  <circle cx="27" cy="28" r="1.5" fill="#1A1A1A"/>
  <circle cx="37" cy="28" r="1.5" fill="#1A1A1A"/>
  <!-- Glasses -->
  <circle cx="27" cy="28" r="4" fill="none" stroke="#1A3A5C" stroke-width="1.2"/>
  <circle cx="37" cy="28" r="4" fill="none" stroke="#1A3A5C" stroke-width="1.2"/>
  <line x1="31" y1="28" x2="33" y2="28" stroke="#1A3A5C" stroke-width="1"/>
  <!-- Graduation cap -->
  <polygon points="16,18 32,10 48,18 32,22" fill="#1A1A2E"/>
  <rect x="30" y="14" width="4" height="6" fill="#1A1A2E"/>
  <rect x="28" y="12" width="8" height="4" rx="1" fill="#1A1A2E"/>
  <!-- Tassel -->
  <line x1="46" y1="18" x2="50" y2="26" stroke="#FFD700" stroke-width="1.5"/>
  <circle cx="50" cy="27" r="2" fill="#FFD700"/>
  <!-- Book in hand -->
  <rect x="6" y="72" width="12" height="10" rx="1" fill="#1E40AF"/>
  <line x1="12" y1="72" x2="12" y2="82" stroke="#93C5FD" stroke-width="0.8"/>
</svg>
