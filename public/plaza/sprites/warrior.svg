<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 128">
  <!-- Warrior - red silhouette with shield -->
  <!-- Shadow -->
  <ellipse cx="32" cy="124" rx="16" ry="4" fill="#000000" opacity="0.15"/>
  <!-- Legs -->
  <rect x="21" y="86" width="10" height="36" rx="4" fill="#5C1A1A"/>
  <rect x="34" y="86" width="10" height="36" rx="4" fill="#5C1A1A"/>
  <!-- Boots -->
  <rect x="18" y="116" width="15" height="8" rx="3" fill="#3D1010"/>
  <rect x="32" y="116" width="15" height="8" rx="3" fill="#3D1010"/>
  <!-- Body / armor -->
  <path d="M17 48 Q17 40 24 38 L40 38 Q47 40 47 48 L47 90 Q47 92 45 92 L19 92 Q17 92 17 90 Z" fill="#DC2626"/>
  <!-- Chest plate -->
  <path d="M22 48 L32 42 L42 48 L42 70 L32 74 L22 70 Z" fill="#B91C1C" opacity="0.7"/>
  <line x1="32" y1="42" x2="32" y2="74" stroke="#991B1B" stroke-width="1"/>
  <!-- Arms -->
  <rect x="8" y="46" width="11" height="30" rx="5" fill="#B91C1C"/>
  <rect x="45" y="46" width="11" height="30" rx="5" fill="#B91C1C"/>
  <!-- Hands -->
  <circle cx="13" cy="78" r="4.5" fill="#D4A574"/>
  <circle cx="51" cy="78" r="4.5" fill="#D4A574"/>
  <!-- Neck -->
  <rect x="28" y="32" width="8" height="7" fill="#D4A574"/>
  <!-- Head -->
  <ellipse cx="32" cy="24" rx="12" ry="13" fill="#D4A574"/>
  <!-- Eyes - stern -->
  <rect x="25" y="22" width="4" height="2" rx="1" fill="#1A1A1A"/>
  <rect x="35" y="22" width="4" height="2" rx="1" fill="#1A1A1A"/>
  <!-- Mouth -->
  <line x1="28" y1="30" x2="36" y2="30" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Helmet -->
  <path d="M18 20 Q18 4 32 4 Q46 4 46 20 L46 18 Q46 8 32 6 Q18 8 18 18 Z" fill="#8B1A1A"/>
  <rect x="18" y="18" width="28" height="4" rx="1" fill="#6B1010"/>
  <!-- Nose guard -->
  <rect x="30" y="16" width="4" height="10" rx="1" fill="#6B1010"/>
  <!-- Shield (left hand) -->
  <ellipse cx="6" cy="72" rx="10" ry="14" fill="#7F1D1D"/>
  <ellipse cx="6" cy="72" rx="7" ry="10" fill="#991B1B"/>
  <line x1="6" y1="60" x2="6" y2="84" stroke="#B91C1C" stroke-width="1.5"/>
  <line x1="-2" y1="72" x2="14" y2="72" stroke="#B91C1C" stroke-width="1.5"/>
  <!-- Sword (right hand) -->
  <rect x="50" y="50" width="3" height="30" rx="1" fill="#9CA3AF"/>
  <rect x="48" y="48" width="7" height="4" rx="1" fill="#6B4A14"/>
  <rect x="50" y="44" width="3" height="6" fill="#D1D5DB"/>
  <!-- Belt -->
  <rect x="17" y="78" width="30" height="4" rx="1" fill="#6B4A14"/>
</svg>
