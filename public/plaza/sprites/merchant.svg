<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 128">
  <!-- Merchant - orange silhouette with bag -->
  <!-- Shadow -->
  <ellipse cx="32" cy="124" rx="16" ry="4" fill="#000000" opacity="0.15"/>
  <!-- Legs -->
  <rect x="21" y="88" width="9" height="34" rx="4" fill="#7C4A1A"/>
  <rect x="34" y="88" width="9" height="34" rx="4" fill="#7C4A1A"/>
  <!-- Shoes -->
  <rect x="19" y="118" width="13" height="6" rx="3" fill="#5C3510"/>
  <rect x="32" y="118" width="13" height="6" rx="3" fill="#5C3510"/>
  <!-- Body / vest -->
  <path d="M19 50 Q19 44 25 42 L39 42 Q45 44 45 50 L45 92 Q45 94 43 94 L21 94 Q19 94 19 92 Z" fill="#EA8C2A"/>
  <!-- Vest detail -->
  <rect x="29" y="50" width="6" height="40" rx="1" fill="#D97706" opacity="0.6"/>
  <!-- Arms -->
  <rect x="10" y="50" width="10" height="28" rx="5" fill="#C2711A"/>
  <rect x="44" y="50" width="10" height="28" rx="5" fill="#C2711A"/>
  <!-- Hands -->
  <circle cx="15" cy="80" r="4" fill="#D4A574"/>
  <circle cx="49" cy="80" r="4" fill="#D4A574"/>
  <!-- Neck -->
  <rect x="28" y="35" width="8" height="8" fill="#D4A574"/>
  <!-- Head -->
  <ellipse cx="32" cy="26" rx="12" ry="13" fill="#D4A574"/>
  <!-- Eyes -->
  <circle cx="27" cy="24" r="1.5" fill="#1A1A1A"/>
  <circle cx="37" cy="24" r="1.5" fill="#1A1A1A"/>
  <!-- Smile -->
  <path d="M27 30 Q32 34 37 30" fill="none" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Hat -->
  <ellipse cx="32" cy="16" rx="16" ry="4" fill="#8B5E1A"/>
  <rect x="22" y="6" width="20" height="12" rx="4" fill="#A0681E"/>
  <!-- Bag / satchel -->
  <rect x="44" y="65" width="14" height="18" rx="3" fill="#8B5E1A"/>
  <line x1="44" y1="65" x2="50" y2="55" stroke="#8B5E1A" stroke-width="2.5"/>
  <rect x="46" y="70" width="10" height="3" rx="1" fill="#6B4A14"/>
  <!-- Belt -->
  <rect x="19" y="76" width="26" height="4" rx="1" fill="#6B4A14"/>
  <rect x="30" y="75" width="4" height="6" rx="1" fill="#FFD700"/>
  <!-- Coin pouch on belt -->
  <ellipse cx="22" cy="82" rx="5" ry="4" fill="#A0681E"/>
</svg>
