<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgBlack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="40%" style="stop-color:#f5d27a"/>
      <stop offset="70%" style="stop-color:#e8b84b"/>
      <stop offset="100%" style="stop-color:#a8722a"/>
    </linearGradient>
    <linearGradient id="boltGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#f5d27a"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>
    <filter id="glowGold" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Pure black background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgBlack)"/>

  <!-- Subtle inner radial gold glow -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#innerGlow)"/>

  <!-- Outer ring — thick gold -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="url(#goldRing)" stroke-width="6" opacity="0.9" filter="url(#glowGold)"/>

  <!-- Inner ring — thin, subtle -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="url(#goldRing)" stroke-width="1.5" opacity="0.3"/>

  <!-- Lightning bolt — white to gold -->
  <polygon
    points="288,72 178,268 248,268 218,438 338,232 262,232"
    fill="url(#boltGold)"
    filter="url(#glowGold)"
  />

  <!-- Orbit accent dots — gold -->
  <circle cx="256" cy="61" r="9" fill="#f5d27a" opacity="0.95" filter="url(#softGlow)"/>
  <circle cx="256" cy="451" r="9" fill="#f5d27a" opacity="0.95" filter="url(#softGlow)"/>
  <circle cx="61" cy="256" r="6" fill="#c9a84c" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="451" cy="256" r="6" fill="#c9a84c" opacity="0.8" filter="url(#softGlow)"/>

  <!-- Corner tick marks on ring -->
  <line x1="256" y1="55" x2="256" y2="70" stroke="#f5d27a" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="442" x2="256" y2="457" stroke="#f5d27a" stroke-width="3" opacity="0.6"/>
  <line x1="55" y1="256" x2="70" y2="256" stroke="#f5d27a" stroke-width="3" opacity="0.6"/>
  <line x1="442" y1="256" x2="457" y2="256" stroke="#f5d27a" stroke-width="3" opacity="0.6"/>
</svg>
