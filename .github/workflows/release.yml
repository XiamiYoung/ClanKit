name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      r2_prefix:
        description: 'R2 path prefix (use "staging" for dry runs, "stable" for production)'
        required: true
        default: 'staging'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  R2_PREFIX: ${{ github.event.inputs.r2_prefix || 'stable' }}

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      # Cache the ~449MB sentence-transformers ONNX model between runs so we
      # don't redownload from HuggingFace on every release. Keyed on the
      # download script's contents — bump the script (URL/file list change)
      # → cache invalidates automatically.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: electron/models/sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
          key: embedding-model-${{ hashFiles('scripts/prepare-embedding-model.js') }}

      - name: Prepare embedding model
        shell: bash
        run: npm run prepare-models

      # Reconstruct gitignored build-config.prod.json from secrets at build time.
      # The runtime app reads releaseFeedUrl out of this file.
      - name: Write build-config.prod.json
        shell: bash
        env:
          API_BASE_URL:               ${{ secrets.API_BASE_URL }}
          GOOGLE_OAUTH_CLIENT_ID:     ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          SIGNING_SALT:               ${{ secrets.SIGNING_SALT }}
          RELEASE_FEED_URL:           https://releases.clankit.app/stable
        run: |
          cat > electron/build-config.prod.json <<EOF
          {
            "apiBaseUrl": "${API_BASE_URL}",
            "googleOAuthClientId": "${GOOGLE_OAUTH_CLIENT_ID}",
            "googleOAuthClientSecret": "${GOOGLE_OAUTH_CLIENT_SECRET}",
            "signingSalt": "${SIGNING_SALT}",
            "mockBackend": false,
            "releaseFeedUrl": "${RELEASE_FEED_URL}"
          }
          EOF

      - name: Build Windows
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build && npx electron-builder --win --publish never

      - name: Upload to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    auto
          R2_ENDPOINT:           ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 cp dist-release/ "s3://clankit-releases/${R2_PREFIX}/" \
            --recursive --endpoint-url "$R2_ENDPOINT" \
            --exclude '*' \
            --include '*.exe' \
            --include '*.exe.blockmap' \
            --include 'latest.yml'

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: electron/models/sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
          key: embedding-model-${{ hashFiles('scripts/prepare-embedding-model.js') }}

      - name: Prepare embedding model
        run: npm run prepare-models

      - name: Write build-config.prod.json
        env:
          API_BASE_URL:               ${{ secrets.API_BASE_URL }}
          GOOGLE_OAUTH_CLIENT_ID:     ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          SIGNING_SALT:               ${{ secrets.SIGNING_SALT }}
          RELEASE_FEED_URL:           https://releases.clankit.app/stable
        run: |
          cat > electron/build-config.prod.json <<EOF
          {
            "apiBaseUrl": "${API_BASE_URL}",
            "googleOAuthClientId": "${GOOGLE_OAUTH_CLIENT_ID}",
            "googleOAuthClientSecret": "${GOOGLE_OAUTH_CLIENT_SECRET}",
            "signingSalt": "${SIGNING_SALT}",
            "mockBackend": false,
            "releaseFeedUrl": "${RELEASE_FEED_URL}"
          }
          EOF

      - name: Build macOS
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build && npx electron-builder --mac --publish never

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    auto
          R2_ENDPOINT:           ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 cp dist-release/ "s3://clankit-releases/${R2_PREFIX}/" \
            --recursive --endpoint-url "$R2_ENDPOINT" \
            --exclude '*' \
            --include '*.dmg' \
            --include '*.dmg.blockmap' \
            --include '*-mac.zip' \
            --include '*-mac.zip.blockmap' \
            --include 'latest-mac.yml'

  cleanup:
    name: Prune R2
    needs: [build-windows, build-macos]
    # Only run on stable releases. Staging dry-runs leave their own files alone.
    if: ${{ (github.event.inputs.r2_prefix || 'stable') == 'stable' }}
    runs-on: ubuntu-latest
    steps:
      - name: Prune old stable versions and wipe staging
        shell: bash
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    auto
          R2_ENDPOINT:           ${{ secrets.R2_ENDPOINT }}
          KEEP:                  '10'
        run: |
          set -euo pipefail

          echo "=== Pruning stable/ to latest $KEEP versions ==="
          versions=$(aws s3 ls "s3://clankit-releases/stable/" \
            --endpoint-url "$R2_ENDPOINT" \
            | awk '{print $4}' \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' \
            | sort -uV || true)

          if [ -z "$versions" ]; then
            echo "No versioned files found in stable/, skipping prune."
          else
            count=$(echo "$versions" | wc -l)
            echo "Found $count versions:"
            echo "$versions"

            if [ "$count" -le "$KEEP" ]; then
              echo "Within retention window ($count <= $KEEP), nothing to prune."
            else
              delete_count=$((count - KEEP))
              delete_versions=$(echo "$versions" | head -n "$delete_count")
              echo "Deleting $delete_count old versions:"
              echo "$delete_versions"

              delete_re=$(echo "$delete_versions" | sed 's/\./\\./g' | paste -sd '|' -)

              aws s3 ls "s3://clankit-releases/stable/" \
                --endpoint-url "$R2_ENDPOINT" \
                | awk '{print $4}' \
                | while read -r file; do
                    [ -z "$file" ] && continue
                    case "$file" in latest*.yml) continue ;; esac
                    file_v=$(echo "$file" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
                    [ -z "$file_v" ] && continue
                    if echo "$file_v" | grep -qE "^(${delete_re})$"; then
                      echo "  rm stable/$file"
                      aws s3 rm "s3://clankit-releases/stable/$file" \
                        --endpoint-url "$R2_ENDPOINT"
                    fi
                  done
            fi
          fi

          echo ""
          echo "=== Wiping staging/ (validated by this stable release) ==="
          staging_listing=$(aws s3 ls "s3://clankit-releases/staging/" \
            --endpoint-url "$R2_ENDPOINT" || true)
          if [ -n "$staging_listing" ]; then
            aws s3 rm "s3://clankit-releases/staging/" --recursive \
              --endpoint-url "$R2_ENDPOINT"
            echo "staging/ cleared."
          else
            echo "staging/ already empty."
          fi
