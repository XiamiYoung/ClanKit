name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  # Allow manual / API-triggered runs on any ref. release-please.yml uses
  # this to wake CI on its bot-authored release PRs (pull_request events
  # raised by GITHUB_TOKEN are silently skipped by GitHub anti-recursion).
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        node: [24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Force electron's postinstall to actually download the binary. Symptom:
      # after `npm ci`, node_modules/electron/dist/ is missing and path.txt
      # is absent → require('electron') throws "Electron failed to install
      # correctly" from any Node-side test that transitively imports
      # electron/lib/dataStore.js. `npm rebuild electron` is NOT enough —
      # install.js exits silently when it thinks the binary is "already
      # there" via cache pointer. Wiping dist/ + path.txt first forces a real
      # download.
      - name: Ensure electron binary is installed
        shell: pwsh
        run: |
          $electronDir = "node_modules/electron"
          if (Test-Path "$electronDir/dist")     { Remove-Item -Recurse -Force "$electronDir/dist" }
          if (Test-Path "$electronDir/path.txt") { Remove-Item -Force         "$electronDir/path.txt" }
          node "$electronDir/install.js"
          if (-not (Test-Path "$electronDir/path.txt")) {
            Write-Error "electron install.js completed but path.txt was not created"
            exit 1
          }
          Write-Host "electron path: $(Get-Content "$electronDir/path.txt")"

      - name: Run test suite
        run: npm test

      - name: Build renderer (smoke check)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build
