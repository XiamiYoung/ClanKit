name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  # Allow manual / API-triggered runs on any ref. release-please.yml uses
  # this to wake CI on its bot-authored release PRs (pull_request events
  # raised by GITHUB_TOKEN are silently skipped by GitHub anti-recursion).
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        node: [24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Force electron's postinstall to actually download the binary. When
      # `actions/setup-node@v4` restores the npm cache, electron's postinstall
      # script can be skipped (cache hit on the tarball), leaving
      # node_modules/electron/dist/ empty. The next `require('electron')` from
      # Node-side test files then throws "Electron failed to install
      # correctly" — see master CI failure on 2026-05-28 affecting tests
      # that transitively import electron/lib/dataStore.js (which does
      # `require('electron')` at module load). `npm rebuild` with
      # foreground-scripts re-runs the postinstall verbosely so any future
      # breakage is loud at install time rather than mysterious at test time.
      - name: Ensure electron binary is installed
        run: npm rebuild electron --foreground-scripts

      - name: Run test suite
        run: npm test

      - name: Build renderer (smoke check)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build
