<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Windows fonts via WSL2 mount — gives Chromium Segoe UI Emoji for emoji rendering -->
  <dir>/mnt/c/Windows/Fonts</dir>

  <!-- Include the system fontconfig so regular Linux fonts still work -->
  <include ignore_missing="yes">/etc/fonts/fonts.conf</include>
</fontconfig>
