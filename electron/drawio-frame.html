<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src * blob: data: 'unsafe-inline' 'unsafe-eval';">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <iframe id="f"
    src="https://embed.diagrams.net/?embed=1&proto=json&spin=1&libraries=1&ui=min"
    frameborder="0">
  </iframe>

  <script>
    var frame = document.getElementById('f')

    window.addEventListener('message', function (e) {
      // Messages from the draw.io iframe — the preload handles forwarding to host
      if (e.source === frame.contentWindow) return
      // Messages from the host (via executeJavaScript) — forward into the draw.io iframe
      try {
        var data = (typeof e.data === 'string') ? e.data : JSON.stringify(e.data)
        frame.contentWindow.postMessage(data, '*')
      } catch (err) {}
    })
  </script>
</body>
</html>
